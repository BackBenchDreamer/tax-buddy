version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taxbuddy
      POSTGRES_USER: taxbuddy
      POSTGRES_PASSWORD: taxbuddy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://taxbuddy:taxbuddy@postgres:5432/taxbuddy
      UPLOAD_DIR: /app/storage/uploads
      OUTPUT_DIR: /app/storage/outputs
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    depends_on:
      - postgres
  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend
volumes:
  postgres_data:
