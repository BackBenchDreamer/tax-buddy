name: Security Scan

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  python-security:
    name: Python Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit
        run: |
          pip install pip-audit
          cd backend
          pip-audit --desc --requirement requirements.txt
        continue-on-error: true

      - name: Run Safety check
        run: |
          pip install safety
          cd backend
          safety check --json --file requirements.txt || true
        continue-on-error: true

      - name: Check for known vulnerabilities with Bandit
        run: |
          pip install bandit
          cd backend
          bandit -r app/ ml/ -f json -o bandit-report.json || true
          bandit -r app/ ml/ -f screen
        continue-on-error: true

  npm-security:
    name: npm Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run npm audit
        run: |
          cd frontend
          npm audit --audit-level=moderate || true
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          cd frontend
          npm outdated || true
        continue-on-error: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.82.13
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [python-security, npm-security, secret-scanning]
    if: always()
    
    steps:
      - name: Check security results
        run: |
          echo "Security scan completed"
          echo "Python Security: ${{ needs.python-security.result }}"
          echo "npm Security: ${{ needs.npm-security.result }}"
          echo "Secret Scanning: ${{ needs.secret-scanning.result }}"
          
          if [[ "${{ needs.python-security.result }}" == "failure" ]] || \
             [[ "${{ needs.npm-security.result }}" == "failure" ]] || \
             [[ "${{ needs.secret-scanning.result }}" == "failure" ]]; then
            echo "⚠️ Security issues detected. Please review the logs."
            exit 1
          fi
          
          echo "✅ No critical security issues detected"

# Made with Bob
