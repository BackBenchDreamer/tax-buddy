name: Code Quality

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  python-type-checking:
    name: Python Type Checking
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy types-requests

      - name: Run mypy
        run: |
          cd backend
          mypy app/ ml/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

  code-complexity:
    name: Code Complexity Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install analysis tools
        run: |
          pip install radon xenon

      - name: Check cyclomatic complexity
        run: |
          cd backend
          echo "=== Cyclomatic Complexity ==="
          radon cc app/ ml/ -a -nb
          echo ""
          echo "=== Maintainability Index ==="
          radon mi app/ ml/ -nb
        continue-on-error: true

      - name: Check for complex functions
        run: |
          cd backend
          xenon --max-absolute B --max-modules A --max-average A app/ ml/
        continue-on-error: true

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check README exists
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md not found"
            exit 1
          fi
          echo "✅ README.md exists"

      - name: Check documentation files
        run: |
          echo "Checking for essential documentation..."
          
          files=(
            "README.md"
            "CONTRIBUTING.md"
            "LICENSE"
            "ARCHITECTURE.md"
            "DEPLOYMENT.md"
          )
          
          missing=0
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            else
              echo "⚠️  $file missing"
              missing=$((missing + 1))
            fi
          done
          
          if [ $missing -gt 2 ]; then
            echo "❌ Too many documentation files missing"
            exit 1
          fi
          
          echo "✅ Documentation check passed"

      - name: Check for TODO/FIXME comments
        run: |
          echo "Searching for TODO/FIXME comments..."
          
          # Search in backend
          cd backend
          todos=$(grep -r "TODO\|FIXME" app/ ml/ --include="*.py" || true)
          
          if [ -n "$todos" ]; then
            echo "Found TODO/FIXME comments:"
            echo "$todos"
          else
            echo "No TODO/FIXME comments found"
          fi
        continue-on-error: true

  python-docstring-coverage:
    name: Python Docstring Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install interrogate
        run: pip install interrogate

      - name: Check docstring coverage
        run: |
          cd backend
          interrogate -vv app/ ml/ --fail-under=30
        continue-on-error: true

  frontend-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Check for console.log statements
        run: |
          cd frontend
          echo "Checking for console.log statements..."
          if grep -r "console\.log" app/ components/ --include="*.tsx" --include="*.ts" | grep -v "// eslint-disable"; then
            echo "⚠️  Found console.log statements. Consider removing them for production."
          else
            echo "✅ No console.log statements found"
          fi
        continue-on-error: true

      - name: Check bundle size (if applicable)
        run: |
          cd frontend
          if [ -d ".next" ]; then
            echo "Checking bundle size..."
            du -sh .next/static/chunks/* | sort -h
          fi
        continue-on-error: true

  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [python-type-checking, code-complexity, documentation-check, python-docstring-coverage, frontend-quality]
    if: always()
    
    steps:
      - name: Check quality results
        run: |
          echo "Code quality checks completed"
          echo "Python Type Checking: ${{ needs.python-type-checking.result }}"
          echo "Code Complexity: ${{ needs.code-complexity.result }}"
          echo "Documentation: ${{ needs.documentation-check.result }}"
          echo "Docstring Coverage: ${{ needs.python-docstring-coverage.result }}"
          echo "Frontend Quality: ${{ needs.frontend-quality.result }}"
          
          # Only fail on documentation check failure
          if [[ "${{ needs.documentation-check.result }}" == "failure" ]]; then
            echo "❌ Documentation check failed"
            exit 1
          fi
          
          echo "✅ Code quality checks completed"

